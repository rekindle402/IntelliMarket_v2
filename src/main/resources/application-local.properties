# DataSource (SSH 터널링: 로컬 3307 -> 홈PC 3306)
spring.datasource.url=jdbc:mysql://localhost:3307/im_v2?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true

# DevTools
spring.devtools.restart.enabled=true

# Springdoc
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Logging
logging.level.com.intellimarket=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.pattern.console=%d{HH:mm:ss} [%highlight(%-5level)] [%cyan(%logger{36})] - %msg%n
